<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моя друга гра</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f3;
        }

        h1 {
            color: #333;
            font-size: 3em;
        }

        button {
            padding: 20px 40px;
            font-size: 1.5em;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px #2980b9;
        }

            button:active {
                box-shadow: 0 0 #2980b9;
                transform: translateY(4px);
            }
    </style>
</head>
<body>
    <h1>Моя друга гра</h1>
    <button onclick="window.location.href='/game'">Почати гру</button>
</body>
</html>
