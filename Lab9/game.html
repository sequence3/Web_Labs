<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Гра з картинками</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }

        .categories {
            margin-bottom: 20px;
        }

            .categories button {
                padding: 10px 20px;
                margin: 5px;
                cursor: pointer;
            }

        #game-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        /* Поле гри 5х5 */
        #grid {
            display: grid;
            grid-template-columns: repeat(5, 100px);
            gap: 10px;
        }

        .grid-cell {
            width: 100px;
            height: 100px;
            border: 2px solid #ccc;
            background: #fff;
            overflow: hidden;
        }

            .grid-cell img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        /* Поточна картинка */
        #current-box {
            width: 150px;
            height: 150px;
            border: 4px dashed #3498db;
            background: #fff;
            padding: 10px;
        }

            #current-box img {
                width: 100%;
                height: 100%;
                cursor: move;
            }

        .ui-droppable-hover {
            background: #dff9fb !important;
            border-color: #22a6b3 !important;
        }

        .matched {
            opacity: 0.3;
            border-color: #2ecc71 !important;
        }
.ui-draggable-dragging {
    width: 150px !important;
    height: 150px !important;
    object-fit: cover;
    z-index: 9999 !important;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
}
    </style>
</head>
<body>
    <h2>Виберіть розділ:</h2>
    <div class="categories">
        <button onclick="startGame('animals')">Тварини</button>
        <button onclick="startGame('insects')">Комахи</button>
        <button onclick="startGame('fish')">Риби</button>
    </div>

    <div id="game-area" style="display:none;">
        <button onclick="location.reload()">Почати з початку</button>
        <div id="game-container">
            <div>
                <h3>Поле гри</h3>
                <div id="grid"></div>
            </div>
            <div>
                <h3>Поточна картинка</h3>
                <p>Перетягніть на збіг!</p>
                <div id="current-box"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
