<!DOCTYPE html>
<html>
<body style="background:#000; margin:0; display:flex; justify-content:center; align-items:center; min-height:100vh;">
    <script>
        // Створення корпусу
        const calc = document.createElement('div');
        calc.style.cssText = 'background:#000; padding:20px; width:300px;';
        document.body.appendChild(calc);

        const display = document.createElement('div');
        display.style.cssText = 'color:#fff; font-size:40px; text-align:right; margin-bottom:10px; height:50px; overflow:hidden;';
        display.textContent = '0';
        calc.appendChild(display);

        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;';
        calc.appendChild(grid);

        // Логіка
        let current = '0';
        let prev = '';
        let op = null;

        const buttons = ['AC', '+/-', '%', '÷', '7', '8', '9', '×', '4', '5', '6', '−', '1', '2', '3', '+', '0', '.', '='];

        buttons.forEach(text => {
            const btn = document.createElement('button');
            btn.textContent = text;
            btn.style.cssText = 'height:60px; border-radius:30px; border:none; font-size:20px; cursor:pointer; color:#fff;';
            btn.style.backgroundColor = (['÷', '×', '−', '+', '='].includes(text)) ? '#ff9f0a' : '#333';
            if (text === '0') btn.style.gridColumn = 'span 2';

            btn.onclick = () => {
                if (text === 'AC') { current = '0'; prev = ''; op = null; }
                else if (['÷', '×', '−', '+'].includes(text)) { prev = current; op = text; current = '0'; }
                else if (text === '=') {
                    let n1 = parseFloat(prev);
                    let n2 = parseFloat(current);
                    if (op === '+') current = (n1 + n2).toString();
                    if (op === '−') current = (n1 - n2).toString();
                    if (op === '×') current = (n1 * n2).toString();
                    if (op === '÷') current = (n1 / n2).toString();
                    prev = ''; op = null;
                } else {
                    current = (current === '0') ? text : current + text;
                }
                display.textContent = current;
            };
            grid.appendChild(btn);
        });
    </script>
</body>
</html>
